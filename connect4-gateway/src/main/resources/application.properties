server.port=8080
spring.application.name=connect4-gateway
spring.cloud.gateway.server.webflux.default-filters=DedupeResponseHeader=Access-Control-Allow-Origin \
  Access-Control-Allow-Credentials, RETAIN_UNIQUE
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-origin-patterns=http://localhost:*,\
  http://127.0.0.1:*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].max-age=3600
security.public-paths=/api/v1/auth/
jwt.secret=76e8b4800d91ac3a6646063b9ec43cc209f8536c738d9ff5030813af3580a126
jwt.expiration=900
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.cloud.gateway.route=TRACE
logging.level.reactor.netty.http.client=DEBUG
logging.level.reactor.netty.http.server=DEBUG